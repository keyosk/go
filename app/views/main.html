<div id="lobby">
  <div class="well">
    <div ng-if="activeChannels && activeChannels.length">
      <div ng-if="getLobbyNameFromChannel(data.channel) && getLobbySizeFromChannel(data.channel)" ng-repeat="data in activeChannels">
        <p>Game In Progress With {{data.occupancy}} People <a ng-href="#/game/{{ getLobbyNameFromChannel(data.channel) }}/{{ getLobbySizeFromChannel(data.channel) }}/">{{ getLobbyNameFromChannel(data.channel) }} (Board Size : {{ getLobbySizeFromChannel(data.channel) }}x{{ getLobbySizeFromChannel(data.channel) }})</a>
      </div>
    </div>
    <div ng-if="activeChannels && !activeChannels.length">
      No Games in Progress
    </div>
    <div ng-if="!activeChannels">
      Loading Games List...
    </div>
  </div>
</div>
